<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林冲·命运之择 — 风雪山神庙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:auto;overflow-x:hidden}
body{background:#0a0a12;color:#e0d5b8;font-family:'Noto Sans SC','Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:linear-gradient(180deg,rgba(10,10,30,0.48),rgba(20,15,25,0.55)),url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed}
#snow-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.container{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 40px;overflow-y:auto}
.landing-title{text-align:center;margin-bottom:3.5vh}
.landing-title .sub{font-size:1.9vh;letter-spacing:6px;color:#a09070;margin-bottom:1.5vh}
.landing-title h1{font-size:8.1vh;font-weight:900;color:#f0e0b8;letter-spacing:14px;text-shadow:0 0 40px rgba(200,50,50,0.3)}
.landing-title h1 span{color:#d43a3a}
.landing-title h1.subh{font-size:5.1vh;letter-spacing:20px;margin-top:0.8vh}
.landing-title .divider{width:8vh;height:2px;background:linear-gradient(90deg,transparent,#d43a3a,transparent);margin:2vh auto}
.landing-title .author{font-size:2.2vh;color:#a09070;letter-spacing:3px}
.intro-text{border:1px solid rgba(196,30,58,0.25);border-radius:8px;padding:2vh 3.5vh;margin-bottom:3.5vh;line-height:1.9;font-size:3vh;color:#d4c9a8;text-indent:2em;max-width:70vh}
.intro-text em{color:#d4b050;font-style:normal;font-weight:600}
.start-btn{display:inline-block;padding:1.8vh 7vh;font-size:3.2vh;font-family:inherit;color:#f0e0b8;background:linear-gradient(135deg,rgba(140,25,25,0.65),rgba(70,12,12,0.85));border:2px solid #d43a3a;border-radius:6px;cursor:pointer;text-decoration:none;letter-spacing:8px;transition:all .3s;flex-shrink:0}
.start-btn:hover{background:linear-gradient(135deg,rgba(200,35,35,0.7),rgba(120,18,18,0.9));border-color:#e84a4a;box-shadow:0 0 5vh rgba(196,30,58,0.35);transform:translateY(-2px)}
.footer-note{margin-top:2vh;font-size:1.9vh;color:#6b5f48;letter-spacing:2px}
#music-btn{position:fixed;top:18px;right:18px;z-index:10;width:40px;height:40px;border-radius:50%;border:2px solid rgba(196,30,58,0.35);background:rgba(10,10,18,0.75);color:#a09070;font-size:18px;cursor:pointer;transition:all .3s;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
#music-btn:hover{border-color:#d43a3a;color:#f0e0b8}
#music-btn.playing{color:#d43a3a;border-color:#d43a3a;box-shadow:0 0 15px rgba(196,30,58,0.25)}
@media(max-width:600px){
.container{padding:15px 20px;max-width:100vw}
.landing-title h1{font-size:5.5vh}
.landing-title h1.subh{font-size:3.5vh}
.intro-text{font-size:2.3vh;padding:1.5vh 2.5vh;max-width:95vw}
.start-btn{padding:1.5vh 5vh;font-size:2.5vh}
.landing-title .sub{font-size:1.5vh}
.author{font-size:1.6vh}
.footer-note{font-size:1.5vh}
}

#trans-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;pointer-events:none;display:none}
#trans-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<button id="music-btn" onclick="toggleMusic()">♫</button>
<audio id="bgm" src="bgm/soft.mp3" loop preload="auto"></audio>
<canvas id="snow-canvas"></canvas>
<div class="container">
  <div class="landing-title">
    <div class="sub">— 互动叙事 · 基于《水浒传》原著 —</div>
    <h1><span>·</span> 林冲 · 命运之择 <span>·</span></h1>
    <div class="divider"></div>
    <div class="author">风 雪 山 神 庙</div>
  </div>
  <div class="intro-text" id="intro-text">
    <p>高俅之子高衙内调戏林冲之妻，设计陷害，林冲被刺配沧州。贼心不死，陆谦、富安追至沧州，收买管营、差拨，欲置林冲于死地。</p>
    <p>你将成为<em>林冲</em>，在步步杀机之中做出抉择。每一次决定，都将导向不同的命运——是隐忍而死，是怒而反叛，还是如原著一般，在风雪之夜完成那场惊心动魄的复仇？</p>
  </div>
  <a href="node1.html" class="start-btn">踏 入 沧 州</a>
  <div class="footer-note">— 点击右上角 ♫ 切换背景音乐 —</div>
</div>
<script>
const c=document.getElementById('snow-canvas'),x=c.getContext('2d');
function R(){c.width=innerWidth;c.height=innerHeight}R();addEventListener('resize',R);
const S=[],N=80;for(let i=N;i--;)S.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2.5+0.8,s:Math.random()*0.8+0.3,o:Math.random()*0.4+0.2});
function D(){x.clearRect(0,0,c.width,c.height);for(const f of S){x.beginPath();x.arc(f.x,f.y,f.r,0,Math.PI*2);x.fillStyle=`rgba(200,195,185,${f.o})`;x.fill();f.y+=f.s;f.x+=Math.sin(f.y*0.01)*0.3;if(f.y>c.height){f.y=-f.r;f.x=Math.random()*c.width}}requestAnimationFrame(D)}D();
const bgm=document.getElementById('bgm');let playing=false;
const ps=sessionStorage.getItem('bgmSrc'),st=sessionStorage.getItem('bgmTime');
if(ps===bgm.src&&st)bgm.currentTime=+st;
sessionStorage.setItem('bgmSrc',bgm.src);
function toggleMusic(){if(bgm.paused){bgm.play().then(()=>{playing=true;document.getElementById('music-btn').textContent='♩';document.getElementById('music-btn').classList.add('playing')}).catch(()=>{})}else{bgm.pause();playing=false;document.getElementById('music-btn').textContent='♫';document.getElementById('music-btn').classList.remove('playing')}}
window.addEventListener('load',()=>{bgm.play().then(()=>{playing=true;document.getElementById('music-btn').textContent='♩';document.getElementById('music-btn').classList.add('playing')}).catch(()=>{});document.addEventListener('click',()=>{if(bgm.paused)bgm.play().then(()=>{playing=true;document.getElementById('music-btn').textContent='♩';document.getElementById('music-btn').classList.add('playing')}).catch(()=>{})},{once:true})});
window.addEventListener('beforeunload',()=>sessionStorage.setItem('bgmTime',bgm.currentTime));
function typeWriter(e,h,s,c){const t=[];let r=h;while(r.length){if(r[0]==='<'){const i=r.indexOf('>');if(i>-1){t.push(r.slice(0,i+1));r=r.slice(i+1)}else{t.push(r[0]);r=r.slice(1)}}else{t.push(r[0]);r=r.slice(1)}}let i=0,o='';e.innerHTML='';function k(){i=t.length}e.addEventListener('click',k);(function n(){if(i>=t.length){e.innerHTML=h;e.removeEventListener('click',k);if(c)c();return}o+=t[i];e.innerHTML=o;i++;setTimeout(n,t[i-1][0]==='<'?0:s)})()}
(function(){const b=document.getElementById('intro-text');if(b){const h=b.innerHTML;b.innerHTML='';typeWriter(b,h,20)}})();
</script>
<div id="trans-overlay"><canvas id="trans-canvas"></canvas></div>

<script>
(function(){
var O=document.getElementById('trans-overlay'),C=document.getElementById('trans-canvas'),X=C.getContext('2d');
function R(){C.width=window.innerWidth||1;C.height=window.innerHeight||1}R();window.addEventListener('resize',R);
var T=sessionStorage.getItem('_trans');sessionStorage.removeItem('_trans');

// === INCOMING: page starts white, fades to reveal content ===
if(T){
  O.style.display='block';R();
  var W=C.width,H=C.height,cx=W/2,cy=H/2;
  var PP=[];for(var i=0;i<400;i++)PP.push({a:Math.random()*Math.PI*2,d:Math.random()*Math.max(W,H)*0.8,r:Math.random()*3+1});
  var S=Date.now();
  (function f(){
    var t=Math.min((Date.now()-S)/500,1),e=1-Math.pow(1-t,3),p=1-e;
    X.clearRect(0,0,W,H);
    X.fillStyle='rgba(250,247,240,'+(0.95*p)+')';X.fillRect(0,0,W,H);
    for(var i=0;i<400;i++){var q=PP[i],a=q.a+e*3,d=q.d*p;
    X.beginPath();X.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,q.r,0,Math.PI*2);
    X.fillStyle='rgba(248,244,235,'+(0.6*p)+')';X.fill()}
    if(t<1)requestAnimationFrame(f);else O.style.display='none'
  })()
}

// === OUTGOING: particles spread from center, page gradually turns white ===
document.addEventListener('click',function(ev){
var a=ev.target.closest('a');if(!a||a.id==='music-btn')return;
var h=a.getAttribute('href');if(!h||h==='#'||h.startsWith('javascript:'))return;
ev.preventDefault();sessionStorage.setItem('_trans','1');
O.style.display='block';R();
var W=C.width,H=C.height,cx=W/2,cy=H/2;
var PP=[];for(var i=0;i<600;i++)PP.push({a:Math.random()*Math.PI*2,sp:0.5+Math.random()*2,sz:1+Math.random()*4});
var S=Date.now();
(function f(){
  var t=Math.min((Date.now()-S)/800,1),e=1-Math.pow(1-t,3);
  X.clearRect(0,0,W,H);
  var g=X.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*e);
  g.addColorStop(0,'rgba(250,247,240,'+Math.min(e+0.05,1)+')');
  g.addColorStop(0.6,'rgba(250,247,240,'+Math.min(e*0.9+0.05,1)+')');
  g.addColorStop(1,'rgba(250,247,240,'+Math.min(e*0.8+0.05,1)+')');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  var n=Math.floor(e*600);
  for(var i=0;i<n;i++){var q=PP[i],a=q.a+e*q.sp*3,d=Math.random()*Math.max(W,H)*1.1*e;
  X.beginPath();X.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,q.sz,0,Math.PI*2);
  X.fillStyle='rgba(248,244,235,0.7)';X.fill()}
  if(t<1)requestAnimationFrame(f);else window.location.href=h
})()})})();
</script>

</body>
</html>
