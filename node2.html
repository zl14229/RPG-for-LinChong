<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节点二 · 疑云调令 — 林冲·命运之择</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:auto;overflow-x:hidden}
body{background:#0a0a12;color:#e0d5b8;font-family:'Noto Sans SC','Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:linear-gradient(180deg,rgba(15,12,25,0.48),rgba(25,15,20,0.55)),url('background/node2.png') center/cover no-repeat fixed}
#snow-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.container{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;padding:2.5vh 3vw;max-width:90vw;margin:0 auto;overflow-y:auto}
.header{text-align:center;flex-shrink:0}
.node-badge{display:inline-block;padding:0.4vh 2vw;border:2px solid #d43a3a;border-radius:4px;font-size:2.2vh;letter-spacing:5px;color:#d43a3a;margin-bottom:0.8vh;font-weight:600}
.header h1{font-size:5.6vh;letter-spacing:10px;color:#f0e0b8;text-shadow:0 0 20px rgba(200,50,50,0.2);font-weight:900}
.header .divider{width:5vh;height:2px;background:linear-gradient(90deg,transparent,#d43a3a,transparent);margin:0.6vh auto}
.content-area{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
.section-title{font-size:2.6vh;color:#d4b050;letter-spacing:5px;margin-bottom:0.8vh;display:flex;align-items:center;gap:10px;font-weight:600;flex-shrink:0}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(212,176,80,0.3),transparent)}
.status-box{border:1px solid rgba(196,30,58,0.25);border-radius:8px;padding:1.6vh 2.2vw;margin-bottom:1.2vh;line-height:1.7;font-size:3.2vh;color:#d4c9a8;flex-shrink:0;background:rgba(0,0,0,0.5)}
.status-box .highlight{color:#f0e0b8;font-weight:600}
.status-box .danger{color:#e84a4a;font-weight:700}
.status-box .subtle{color:#a09070}
.status-box p{margin-bottom:0.4vh}
.choices{display:flex;flex-direction:column;gap:0.8vh;flex-shrink:0}
.choice{display:block;background:rgba(20,18,30,0.88);border:2px solid rgba(196,30,58,0.2);border-radius:8px;padding:1.5vh 2vw;text-decoration:none;color:#d4c9a8;transition:all .3s;cursor:pointer;backdrop-filter:blur(6px)}
.choice:hover{background:rgba(45,38,60,0.92);border-color:#d43a3a;transform:translateX(4px);box-shadow:0 0 3vh rgba(196,30,58,0.15)}
.choice .main-row{display:flex;align-items:center;margin-bottom:0.3vh}
.choice .letter{display:inline-flex;width:3.8vh;height:3.8vh;align-items:center;justify-content:center;border:2px solid #d43a3a;border-radius:50%;font-size:2.6vh;color:#d43a3a;margin-right:1.4vw;flex-shrink:0;font-weight:700}
.choice .text{font-size:3.8vh;color:#f0e0b8;letter-spacing:2px;font-weight:700}
.choice .desc{font-size:2.8vh;color:#a09070;margin-left:5vw;line-height:1.5}
.back-link{display:inline-block;margin-top:0.6vh;font-size:2.2vh;color:#7a6e50;text-decoration:none;letter-spacing:2px;transition:color .3s;font-weight:500;flex-shrink:0}
.back-link:hover{color:#d4b050}
#music-btn{position:fixed;top:18px;right:18px;z-index:10;width:40px;height:40px;border-radius:50%;border:2px solid rgba(196,30,58,0.35);background:rgba(10,10,18,0.75);color:#a09070;font-size:18px;cursor:pointer;transition:all .3s;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
#music-btn:hover{border-color:#d43a3a;color:#f0e0b8}
#music-btn.playing{color:#d43a3a;border-color:#d43a3a;box-shadow:0 0 15px rgba(196,30,58,0.25)}
.reveal-btn{display:none;cursor:pointer;text-align:center;padding:1vh 0;font-size:2.6vh;color:#d4b050;letter-spacing:4px;border:1px dashed rgba(212,176,80,0.3);border-radius:6px;transition:all .3s;flex-shrink:0}
.reveal-btn:hover{border-color:#d4b050;background:rgba(212,176,80,0.06);color:#f0e0b8}
.node-nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px}
.node-nav a{display:flex;width:26px;height:26px;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(196,30,58,0.25);background:rgba(10,10,18,0.55);color:#6b5f48;font-size:12px;text-decoration:none;transition:all .3s;backdrop-filter:blur(3px);font-weight:600}
.node-nav a:hover{border-color:#d43a3a;color:#f0e0b8}
.node-nav a.active{background:#d43a3a;border-color:#d43a3a;color:#f0e0b8}
@media(max-width:600px){
.container{padding:2vh 4vw;max-width:100vw}
.status-box{font-size:2.5vh;padding:1.2vh 3vw}
.choice .text{font-size:3vh}
.choice .desc{font-size:2.2vh;margin-left:3.5vw}
.header h1{font-size:4.2vh;letter-spacing:5px}
.choice .letter{width:3vh;height:3vh;font-size:1.9vh;margin-right:2vw}
.section-title{font-size:2vh}
.node-badge{font-size:1.7vh;padding:0.3vh 3vw}
.reveal-btn{font-size:2vh}
.back-link{font-size:1.8vh}
.choices{gap:0.5vh}
.choice{padding:1.2vh 3vw}
}

#trans-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;pointer-events:none;display:none}
#trans-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<button id="music-btn" onclick="toggleMusic()">♫</button>
<audio id="bgm" src="bgm/soft.mp3" loop preload="auto"></audio>
<canvas id="snow-canvas"></canvas>
<div class="container">
  <div class="header">
    <div class="node-badge">节 点 二</div>
    <h1>疑 云 调 令</h1>
    <div class="divider"></div>
  </div>
  <div class="content-area">
    <div class="section-title">沧州城</div>
    <div class="status-box" id="status-box">
      <p>林冲买了一把解腕尖刀，在沧州城里城外<span class="highlight">团团寻了三五日</span>，却不见动静，心中渐渐松懈。到第六日，管营忽然召见，说抬举林冲去城外十五里大军草场管事："<span class="subtle">在那里寻几贯盘缠。</span>"</p>
      <p>这调令来得蹊跷——陆谦刚出现，管营便要将自己调出城去。<span class="danger">看似抬举，实为调虎离山？</span>林冲心中疑惑："却不害我，倒与我好差使，正不知何意？"</p>
    </div>
    <div class="section-title">面 临 抉 择</div>
    <div class="reveal-btn" id="reveal-btn" onclick="revealChoices()">— 点击此处做出抉择 —</div>
    <div class="choices" id="choices" style="display:none">
      <a href="node3.html" class="choice"><div class="main-row"><span class="letter">A</span><span class="text">接受调岗</span></div></a>
      <a href="death.html?from=2B" class="choice"><div class="main-row"><span class="letter">B</span><span class="text">拒绝调岗</span></div></a>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;flex-shrink:0;width:100%">
    <a href="node1.html" class="back-link">〈 上一节点</a>
    <a href="index.html" class="back-link">返回首页 〉</a>
  </div>
</div>
<script>
const c=document.getElementById('snow-canvas'),x=c.getContext('2d');
function R(){c.width=innerWidth;c.height=innerHeight}R();addEventListener('resize',R);const S=[],N=60;for(let i=N;i--;)S.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.5,s:Math.random()*0.6+0.2,o:Math.random()*0.3+0.15});
function D(){x.clearRect(0,0,c.width,c.height);for(const f of S){x.beginPath();x.arc(f.x,f.y,f.r,0,Math.PI*2);x.fillStyle=`rgba(200,195,185,${f.o})`;x.fill();f.y+=f.s;f.x+=Math.sin(f.y*0.008)*0.2;if(f.y>c.height){f.y=-f.r;f.x=Math.random()*c.width}}requestAnimationFrame(D)}D();
const bgm=document.getElementById('bgm');let playing=false;
const ps=sessionStorage.getItem('bgmSrc'),st=sessionStorage.getItem('bgmTime');
if(ps===bgm.src&&st)bgm.currentTime=+st;
sessionStorage.setItem('bgmSrc',bgm.src);
function toggleMusic(){if(bgm.paused){bgm.play().then(()=>{playing=true;document.getElementById('music-btn').textContent='♩';document.getElementById('music-btn').classList.add('playing')}).catch(()=>{})}else{bgm.pause();playing=false;document.getElementById('music-btn').textContent='♫';document.getElementById('music-btn').classList.remove('playing')}}
window.addEventListener('load',()=>{bgm.play().then(()=>{playing=true;document.getElementById('music-btn').textContent='♩';document.getElementById('music-btn').classList.add('playing')}).catch(()=>{});document.addEventListener('click',()=>{if(bgm.paused)bgm.play().then(()=>{playing=true;document.getElementById('music-btn').textContent='♩';document.getElementById('music-btn').classList.add('playing')}).catch(()=>{})},{once:true})});
window.addEventListener('beforeunload',()=>sessionStorage.setItem('bgmTime',bgm.currentTime));
function typeWriter(e,h,s,c){const t=[];let r=h;while(r.length){if(r[0]==='<'){const i=r.indexOf('>');if(i>-1){t.push(r.slice(0,i+1));r=r.slice(i+1)}else{t.push(r[0]);r=r.slice(1)}}else{t.push(r[0]);r=r.slice(1)}}let i=0,o='';e.innerHTML='';function k(){i=t.length}e.addEventListener('click',k);(function n(){if(i>=t.length){e.innerHTML=h;e.removeEventListener('click',k);if(c)c();return}o+=t[i];e.innerHTML=o;i++;setTimeout(n,t[i-1][0]==='<'?0:s)})()}
function revealChoices(){document.getElementById('choices').style.display='flex';document.getElementById('reveal-btn').style.display='none'}
const fe=sessionStorage.getItem('fromEnding');sessionStorage.removeItem('fromEnding');
if(fe){document.getElementById('choices').style.display='flex';document.getElementById('reveal-btn').style.display='none'}else{(function(){const b=document.getElementById('status-box');if(b){const h=b.innerHTML;b.innerHTML='';typeWriter(b,h,20,function(){const r=document.getElementById('reveal-btn');if(r)r.style.display='block'})}})()}
</script>
<div class="node-nav"><a href="node1.html">1</a><a href="node2.html" class="active">2</a><a href="node3.html">3</a><a href="node4.html">4</a></div>
<div id="trans-overlay"><canvas id="trans-canvas"></canvas></div>

<script>
(function(){
var O=document.getElementById('trans-overlay'),C=document.getElementById('trans-canvas'),X=C.getContext('2d');
function R(){C.width=window.innerWidth||1;C.height=window.innerHeight||1}R();window.addEventListener('resize',R);
var T=sessionStorage.getItem('_trans');sessionStorage.removeItem('_trans');

// === INCOMING: page starts white, fades to reveal content ===
if(T){
  O.style.display='block';R();
  var W=C.width,H=C.height,cx=W/2,cy=H/2;
  var PP=[];for(var i=0;i<400;i++)PP.push({a:Math.random()*Math.PI*2,d:Math.random()*Math.max(W,H)*0.8,r:Math.random()*3+1});
  var S=Date.now();
  (function f(){
    var t=Math.min((Date.now()-S)/500,1),e=1-Math.pow(1-t,3),p=1-e;
    X.clearRect(0,0,W,H);
    X.fillStyle='rgba(250,247,240,'+(0.95*p)+')';X.fillRect(0,0,W,H);
    for(var i=0;i<400;i++){var q=PP[i],a=q.a+e*3,d=q.d*p;
    X.beginPath();X.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,q.r,0,Math.PI*2);
    X.fillStyle='rgba(248,244,235,'+(0.6*p)+')';X.fill()}
    if(t<1)requestAnimationFrame(f);else O.style.display='none'
  })()
}

// === OUTGOING: particles spread from center, page gradually turns white ===
document.addEventListener('click',function(ev){
var a=ev.target.closest('a');if(!a||a.id==='music-btn')return;
var h=a.getAttribute('href');if(!h||h==='#'||h.startsWith('javascript:'))return;
ev.preventDefault();sessionStorage.setItem('_trans','1');
O.style.display='block';R();
var W=C.width,H=C.height,cx=W/2,cy=H/2;
var PP=[];for(var i=0;i<600;i++)PP.push({a:Math.random()*Math.PI*2,sp:0.5+Math.random()*2,sz:1+Math.random()*4});
var S=Date.now();
(function f(){
  var t=Math.min((Date.now()-S)/800,1),e=1-Math.pow(1-t,3);
  X.clearRect(0,0,W,H);
  var g=X.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*e);
  g.addColorStop(0,'rgba(250,247,240,'+Math.min(e+0.05,1)+')');
  g.addColorStop(0.6,'rgba(250,247,240,'+Math.min(e*0.9+0.05,1)+')');
  g.addColorStop(1,'rgba(250,247,240,'+Math.min(e*0.8+0.05,1)+')');
  X.fillStyle=g;X.fillRect(0,0,W,H);
  var n=Math.floor(e*600);
  for(var i=0;i<n;i++){var q=PP[i],a=q.a+e*q.sp*3,d=Math.random()*Math.max(W,H)*1.1*e;
  X.beginPath();X.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,q.sz,0,Math.PI*2);
  X.fillStyle='rgba(248,244,235,0.7)';X.fill()}
  if(t<1)requestAnimationFrame(f);else window.location.href=h
})()})})();
</script>

</body>
</html>
